name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SERVICE_NAME: portfolio
  REGION: us-central1
  REPOSITORY: cloud-run-source-deploy

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROV }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Ensure Artifact Registry repo exists
        run: |
          if ! gcloud artifacts repositories describe "${REPOSITORY}" --location="${REGION}" >/dev/null 2>&1; then
            gcloud artifacts repositories create "${REPOSITORY}" \
              --repository-format=docker \
              --location="${REGION}" \
              --description="Cloud Run images" \
              --quiet
          fi

      - name: Build Docker image
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${REPOSITORY}/${SERVICE_NAME}"
          docker build \
            -t "${IMAGE}:${{ github.sha }}" \
            -t "${IMAGE}:latest" \
            .
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Push Docker image
        run: docker push --all-tags "${IMAGE}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${SERVICE_NAME}" \
            --image="${IMAGE}:${{ github.sha }}" \
            --region="${REGION}" \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=256Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=2 \
            --quiet

      - name: Show Service URL
        run: |
          URL=$(gcloud run services describe "${SERVICE_NAME}" \
            --region "${REGION}" \
            --format='value(status.url)')
          echo "::notice title=Deployment ready::${URL}"
          echo "Deployed to: ${URL}" >> "$GITHUB_STEP_SUMMARY"
